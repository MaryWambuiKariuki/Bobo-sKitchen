<h2 align="center">Create Staff Account</h2>

<form align="center">

    <label>Full Name:</label>
    <br>
    <input type="text">

    <br><br>

    <label>Username:</label>
    <br>
    <input type="text">

    <br><br>

    <label>Email:</label>
    <br>
    <input type="email">

    <br><br>

    <label>Password:</label>
    <br>
    <input type="password">

    <br><br>

    <label>Confirm Password:</label>
    <br>
    <input type="password">

    <br><br>

    <label>Role:</label>
    <br>

    <select>
        <option>Employee</option>
        <option>Employer</option>
    </select>

    <br><br>

    <button type="submit">
        Create Account
    </button>

</form>
